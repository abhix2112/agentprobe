name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  orchestrator:
    name: orchestrator (cargo check + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Cache the cargo registry + target dir keyed on Cargo.toml.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: orchestrator

      # The real compiler gate: nothing untested-by-compiler reaches
      # `docker compose build`. Runtime SQLx queries + sqlx::migrate! need no
      # database at compile time, so this runs without Postgres.
      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  engine:
    name: engine (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            engine/requirements.txt
            engine/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: pytest
        run: pytest -q
